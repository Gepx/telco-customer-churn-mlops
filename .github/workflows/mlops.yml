name: MLflow CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Run actions/checkout@v3
        uses: actions/checkout@v3
        with:
          lfs: true

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"

      - name: Check Env
        run: |
          python --version
          pip --version

      - name: Install dependencies
        run: |
          pip install mlflow pandas scikit-learn numpy scipy pyarrow cloudpickle

      - name: Run mlflow project
        run: |
          mlflow run MLProject --env-manager=local

      - name: Get latest MLflow run_id
        id: get_run_id
        run: |
          RUN_ID=$(cat MLProject/run_id.txt)
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Run ID: $RUN_ID"
          echo "=== Artifacts ==="
          find mlruns -type d -name "model" -path "*/artifacts/*"

      - name: Install Python dependencies
        run: |
          pip install mlflow pandas scikit-learn numpy scipy pyarrow cloudpickle

      - name: Upload to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts
          path: mlruns/

      - name: Build Docker Model
        run: |
          MODEL_PATH=$(find mlruns -type d -name "model" -path "*/artifacts/*" | head -1)
          echo "Found model at: $MODEL_PATH"
          mlflow models build-docker -m "$MODEL_PATH" -n ${{ secrets.DOCKERHUB_USERNAME }}/telco-customer-churn:latest

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag Docker Image
        run: |
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/telco-customer-churn:latest ${{ secrets.DOCKERHUB_USERNAME }}/telco-customer-churn:v1.0

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/telco-customer-churn:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/telco-customer-churn:v1.0
